---
# IstadAi - Audit Flash Maturité IA
# 10 questions situationnelles (8 axes + 2 transverses)
# Format : champ texte libre optionnel (non scoré) + auto-évaluation 5 ancres
# Échelle CMMI : 1 Initial / 2 Aware / 3 Defined / 4 Managed / 5 Optimized
# Compatible avec framework_axes.yaml (agent-audit-maturite)

version: "1.0.0"

# ============================================================
# Couleurs niveaux (alignées avec agent-audit-maturite)
# ============================================================
level_colors:
  1: "#D32F2F"
  2: "#F57C00"
  3: "#FBC02D"
  4: "#7CB342"
  5: "#388E3C"

level_names:
  1: "Initial"
  2: "Aware"
  3: "Defined"
  4: "Managed"
  5: "Optimized"

level_descriptions:
  1: "L'IA reste une intention diffuse, sans cadre ni pilotage."
  2: "Conscience, premiers pilotes, gouvernance émergente."
  3: "Pratiques formalisées, premiers cas en production, périmètres définis."
  4: "Pilotage par KPI, scaling actif, gouvernance opérationnelle."
  5: "IA intégrée à la stratégie et aux opérations, mesure d'impact systématique."

# ============================================================
# Roles for Q10 (non scorée - contextualisation)
# ============================================================
roles:
  - "DG / Président"
  - "DAF / Directeur Financier"
  - "DSI / CTO / CDO"
  - "CAIO / Chief AI Officer"
  - "Directeur Métier"
  - "Autre"

# ============================================================
# Les 10 questions
# ============================================================
questions:
  - id: q1
    axis_code: V
    axis_name: "Vision & Alignement stratégique"
    text_prompt: "En une phrase, décrivez la vision IA de votre entreprise."
    eval_prompt: "Évaluez son degré de formalisation, de partage et d'alignement business."
    anchors:
      1: "Pas de vision IA explicite."
      2: "Quelques convictions personnelles du DG, rien d'écrit."
      3: "Vision rédigée mais peu diffusée au-delà du COMEX."
      4: "Vision partagée au COMEX, alignée avec la stratégie business, communiquée aux équipes."
      5: "Vision partagée à tous les niveaux, pilotée par KPIs, revue chaque année."

  - id: q2
    axis_code: P
    axis_name: "Portefeuille de cas d'usage"
    text_prompt: "Citez 2 cas d'usage IA dans lesquels vous investissez aujourd'hui."
    eval_prompt: "Évaluez votre processus de priorisation des cas d'usage."
    anchors:
      1: "Cas d'usage opportunistes, aucune sélection structurée."
      2: "Quelques POC isolés, choix intuitif."
      3: "Portefeuille listé mais critères de priorisation flous."
      4: "Portefeuille priorisé selon valeur / faisabilité / risque."
      5: "Portefeuille piloté trimestriellement avec KPI ROI et taux de mise en prod."

  - id: q3
    axis_code: D
    axis_name: "Données & Technologie"
    multiselect:
      label: "Quel(s) outil(s) ou stack IA utilisez-vous aujourd'hui ? (cochez tout ce qui s'applique - au moins une réponse)"
      required: true
      options:
        - "Aucun, ou usage individuel non encadré (ChatGPT grand public personnel)"
        - "ChatGPT Enterprise / Team / Plus"
        - "Microsoft Copilot (M365, GitHub)"
        - "Claude (Anthropic) Team / Enterprise"
        - "Mistral Le Chat / API"
        - "Google Gemini / Vertex AI"
        - "GPTs internes ou agents no-code"
        - "RAG sur base documentaire interne"
        - "Agents métier en production (workflows automatisés)"
        - "Modèle propriétaire ou fine-tuné en interne"
        - "Autre (précisez dans la zone de texte ci-dessous)"
    text_prompt: "Décrivez l'état actuel de votre socle data ET votre usage IA (qualité, accessibilité, gouvernance, outils déployés, périmètre métier)."
    eval_prompt: "Évaluez le niveau de maturité globale (socle data + stack IA)."
    anchors:
      1: "Données dispersées, aucun outil IA déployé ou usage personnel non encadré."
      2: "Data lake/DWH avec qualité hétérogène, OU LLM SaaS souscrit en mode chat individuel."
      3: "Socle data structuré OU LLM déployé avec charte d'usage et premières expérimentations métier cadrées."
      4: "Socle data fiable ET LLM intégré aux process clés via API, agents simples ou GPTs métier."
      5: "Data products gouvernés ET architecture IA mature (RAG, agents métier en prod, ou modèle propriétaire avec observabilité)."

  - id: q4
    axis_code: O
    axis_name: "Organisation & Change"
    text_prompt: "Qui pilote l'IA dans votre organisation ? (rôle, instance)"
    eval_prompt: "Évaluez le niveau de structuration organisationnelle."
    anchors:
      1: "Aucun rôle dédié, l'IA est un sujet diffus."
      2: "Un référent informel (souvent côté DSI)."
      3: "Comité IA mensuel, rôles flous au-delà du COMEX."
      4: "Modèle opératoire défini (centre d'excellence, champions métier, gouvernance écrite)."
      5: "Organisation IA dimensionnée, RACI clair, change management piloté."

  - id: q5
    axis_code: T
    axis_name: "Talent & Compétences"
    text_prompt: "Décrivez votre dispositif de formation IA (qui, quoi, quand)."
    eval_prompt: "Évaluez la maturité des compétences IA dans l'organisation."
    anchors:
      1: "Aucun plan de formation IA."
      2: "Quelques formations ponctuelles, pas de plan."
      3: "Acculturation COMEX faite, équipes métier inégales."
      4: "Plan de formation par niveau, experts internes en place."
      5: "Filière IA structurée, formation continue, mobilité interne organisée."

  - id: q6
    axis_code: A
    axis_name: "Adoption & Scaling"
    text_prompt: "Combien d'utilisateurs internes utilisent vraiment vos solutions IA aujourd'hui ?"
    eval_prompt: "Évaluez le niveau d'adoption opérationnelle."
    anchors:
      1: "Aucune solution IA en production."
      2: "1-2 POC isolés, peu utilisés."
      3: "Quelques solutions en prod, adoption inégale."
      4: "Plusieurs solutions adoptées, taux d'usage mesuré."
      5: "IA intégrée aux process clés, scaling industriel, taux d'usage > 70%."

  - id: q7
    axis_code: M
    axis_name: "Avantage compétitif & ROI"
    text_prompt: "Citez un gain mesurable obtenu grâce à l'IA (chiffre, effet, indicateur)."
    eval_prompt: "Évaluez la mesure de l'avantage compétitif IA."
    anchors:
      1: "Aucune mesure d'impact IA."
      2: "Quelques anecdotes, pas de chiffres."
      3: "Gains estimés au doigt mouillé."
      4: "Indicateurs de gains documentés par cas d'usage."
      5: "Avantage compétitif IA mesuré et publié (rapport annuel / COMEX)."

  - id: q8
    axis_code: G
    axis_name: "Gouvernance & Risque IA"
    text_prompt: "Quel dispositif avez-vous pour encadrer les risques IA (éthique, sécurité, conformité, IA Act) ?"
    eval_prompt: "Évaluez la maturité de la gouvernance IA."
    anchors:
      1: "Aucun dispositif spécifique IA."
      2: "Sujet identifié mais pas traité."
      3: "Charte IA rédigée, application inégale."
      4: "Comité éthique IA, processus d'évaluation des risques."
      5: "Dispositif intégré (IA Act ready, audits réguliers, registre cas d'usage)."

  - id: q9
    axis_code: "TRANSVERSE-1"
    axis_name: "Maturité globale réelle"
    text_prompt: null
    eval_prompt: "Combien de cas d'usage IA sont réellement en production aujourd'hui ?"
    anchors:
      1: "Aucun."
      2: "1 ou 2 POC."
      3: "3 à 5 cas d'usage en prod."
      4: "6 à 15 cas d'usage en prod."
      5: "Plus de 15 cas d'usage en prod, scaling continu."

  # Q10 : contextualisation (non scorée, géré séparément dans app.py)

# ============================================================
# Texte de consentement court (affiché par défaut)
# ============================================================
consent_short: |
  Audit **gratuit**, scoring **déterministe**. Vos coordonnées vous seront
  demandées en fin de questionnaire pour accéder à votre synthèse
  (conservées 12 mois, jamais partagées). Option d'analyse qualitative
  par **Claude (Anthropic)**, désactivable à tout moment, sans
  entraînement des modèles.

# ============================================================
# Texte de consentement long (déplié dans un expander)
# ============================================================
consent_text: |
  **Scoring.** Vos réponses sont calculées selon une grille d'analyse
  construite par IstadAi, traçable et reproductible.

  **Option d'analyse qualitative par Claude (Anthropic).** Si vous
  l'autorisez explicitement à l'étape suivante, vos verbatims et vos
  scores sont analysés par Claude pour produire un commentaire
  personnalisé et détecter trois types de dissonances narratives (entre
  verbatims, entre verbatim et option choisie, entre scores d'axes).

  **Garanties contractuelles Anthropic.** Anthropic agit en tant que
  sous-traitant. Les données envoyées via leur API ne sont pas utilisées
  pour entraîner les modèles, ne sont pas revendues à des tiers, et sont
  supprimées sous 30 jours (politique commerciale standard documentée
  sur anthropic.com/legal/commercial-terms).

  **Vos coordonnées.** Collectées en fin d'audit par IstadAi (responsable
  du traitement), conservées 12 mois maximum, jamais partagées avec un
  tiers. Suppression à tout moment sur demande à
  pierre-alain.laval@istada.fr.

  **Architecture IA selon le périmètre.** Dans cet audit flash,
  l'analyse Claude (optionnelle) passe par notre propre clé API Anthropic
  avec les garanties ci-dessus. Dans l'audit complet d'IstadAi
  (entretiens multi-sponsors, analyses augmentées, narration COMEX),
  l'IA est opérée via l'instance IA de votre organisation (architecture
  **BYOLLM**, *Bring Your Own LLM*) pour garantir souveraineté et
  conformité.

  Le résultat affiché est indicatif et ne se substitue pas à un audit
  professionnel.

# ============================================================
# CTA final (vers commercial)
# ============================================================
cta:
  contact_email: "pierre-alain.laval@istada.fr"
  contact_label: "Discuter de ces résultats avec IstadAi"
  audit_complete_label: "Demander un audit complet (entretiens multi-sponsors + analyses augmentées par l'IA de votre organisation + cross-check budget)"
